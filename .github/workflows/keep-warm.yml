name: Keep API Warm

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (UTC)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint (log status + timing)
        shell: bash
        run: |
          set -euo pipefail

          BASE="https://trucking-api-aufgacg4hsbghka6.westus3-01.azurewebsites.net"

          echo "Pinging $BASE/health"
          curl -sS --max-time 20 --retry 3 --retry-delay 2 --retry-all-errors \
            -o /dev/null \
            -w "health status=%{http_code} connect=%{time_connect}s ttfb=%{time_starttransfer}s total=%{time_total}s\n" \
            "$BASE/health"

          echo "Pinging $BASE/api/company"
          curl -sS --max-time 20 --retry 3 --retry-delay 2 --retry-all-errors \
            -o /dev/null \
            -w "incidents status=%{http_code} connect=%{time_connect}s ttfb=%{time_starttransfer}s total=%{time_total}s\n" \
            "$BASE/api/company"

          echo "Done."
