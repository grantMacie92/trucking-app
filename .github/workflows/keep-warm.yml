name: Keep API Warm

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS curl -fsS --max-time 20 https://trucking-api-aufgacg4hsbghka6.westus3-01.azurewebsites.net/health > /dev/null
